services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: reveste
      POSTGRES_USER: reveste
      POSTGRES_PASSWORD: reveste
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reveste -d reveste"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - dados_postgres:/var/lib/postgresql/data

  # Aplica as migrações versionadas com a ferramenta embarcada (apps/back/cmd/migrate),
  # substituindo o antigo docker-entrypoint-initdb.d. Roda uma vez após o Postgres ficar
  # saudável e encerra. Reexecutar é seguro: migrações já aplicadas são ignoradas.
  migrate:
    image: golang:1.25-alpine
    working_dir: /app
    environment:
      DATABASE_URL: postgres://reveste:reveste@postgres:5432/reveste?sslmode=disable
    command: ["go", "run", "./apps/back/cmd/migrate", "up"]
    volumes:
      - .:/app
      - cache_go_mod:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  dados_postgres:
  cache_go_mod:
